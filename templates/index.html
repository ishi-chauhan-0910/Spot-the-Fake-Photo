<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot the Fake Photo - Live Webcam Demo</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-glow-blue: rgba(59, 130, 246, 0.4);
            --accent-glow-green: rgba(16, 185, 129, 0.4);
            --accent-glow-red: rgba(239, 68, 68, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #030712;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view for natural interaction */
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            box-shadow: 0 0 10px var(--accent-blue);
            animation: scan 3s linear infinite;
            pointer-events: none;
            opacity: 0.7;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow-blue);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow-blue);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Result Panel Styling */
        .result-panel {
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 380px;
        }

        .status-badge {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 16px;
            border-radius: 30px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .status-badge.scanning {
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .verdict-text {
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 5px;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            transition: all 0.3s ease;
        }

        .gauge-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 24px;
        }

        .circular-progress {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circular-progress circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .circular-progress .bg-circle {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .circular-progress .fg-circle {
            stroke: var(--accent-blue);
            stroke-dasharray: 471.2; /* 2 * PI * r (r=75) */
            stroke-dashoffset: 471.2;
            transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
        }

        .percentage-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .percentage-label span {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-top: -2px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Color state modifications */
        .state-real {
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.2) !important;
        }
        .state-real .fg-circle {
            stroke: var(--accent-green) !important;
        }
        .state-real .verdict-text {
            color: var(--accent-green);
        }
        .state-real .status-badge {
            color: var(--accent-green);
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .state-screen {
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.2) !important;
        }
        .state-screen .fg-circle {
            stroke: var(--accent-red) !important;
        }
        .state-screen .verdict-text {
            color: var(--accent-red);
        }
        .state-screen .status-badge {
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="title-main">Spot the Fake Photo</h1>
        <p id="sub-main">Live AI Webcam Recapture & Anti-Spoofing Detector</p>
    </header>

    <div class="main-layout">
        <!-- Camera Section -->
        <div class="glass-panel" id="camera-panel">
            <h2 style="font-size: 1.25rem; font-weight: 600; letter-spacing: -0.2px;">Live Camera Feed</h2>
            <div class="camera-container" id="cam-container">
                <video id="webcam" autoplay playsinline muted></video>
                <div class="scanner-line" id="scanner"></div>
            </div>
            <div class="controls">
                <button class="btn-primary" id="btn-toggle-detect" onclick="toggleDetection()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path></svg>
                    <span>Start Live Feed</span>
                </button>
                <button class="btn-secondary" id="btn-single-capture" onclick="singleTrigger()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                    Capture Frame
                </button>
            </div>
        </div>

        <!-- Result Section -->
        <div class="glass-panel result-panel" id="result-panel">
            <div class="status-badge" id="badge">Offline</div>
            <div class="verdict-text" id="verdict">Ready</div>

            <div class="gauge-container">
                <svg class="circular-progress">
                    <circle class="bg-circle" cx="80" cy="80" r="75"></circle>
                    <circle class="fg-circle" id="progress-indicator" cx="80" cy="80" r="75"></circle>
                </svg>
                <div class="percentage-label">
                    <span id="percentage-val">0%</span>
                    <span id="label-type">Confidence</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-val" id="stat-latency">--</span>
                    <span class="stat-lbl">Latency</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="stat-fps">--</span>
                    <span class="stat-lbl">FPS</span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    SalesCode AI Computer Vision Task &bull; On-Device Analysis
</footer>

<!-- Offscreen Canvas for Frame Capture -->
<canvas id="capture-canvas" style="display: none;" width="640" height="480"></canvas>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('capture-canvas');
    const ctx = canvas.getContext('2d');
    const btnToggle = document.getElementById('btn-toggle-detect');
    const btnCapture = document.getElementById('btn-single-capture');
    
    const panelResult = document.getElementById('result-panel');
    const badge = document.getElementById('badge');
    const verdict = document.getElementById('verdict');
    const progressCircle = document.getElementById('progress-indicator');
    const percentageVal = document.getElementById('percentage-val');
    
    const statLatency = document.getElementById('stat-latency');
    const statFps = document.getElementById('stat-fps');

    let stream = null;
    let isDetecting = false;
    let detectionInterval = null;
    let lastFrameTime = 0;

    async function toggleDetection() {
        if (!stream) {
            // Start Camera
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' },
                    audio: false
                });
                video.srcObject = stream;
                btnToggle.querySelector('span').innerText = "Stop Detector";
                btnToggle.style.background = "linear-gradient(135deg, var(--accent-red) 0%, #dc2626 100%)";
                btnToggle.style.boxShadow = "0 4px 15px var(--accent-glow-red)";
                btnCapture.disabled = false;
                badge.innerText = "Active";
                badge.className = "status-badge scanning";
                
                isDetecting = true;
                startPolling();
            } catch (err) {
                console.error("Camera access error: ", err);
                alert("Camera access denied or unavailable. Please enable permissions.");
            }
        } else {
            // Stop Camera
            stopPolling();
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            stream = null;
            isDetecting = false;
            
            btnToggle.querySelector('span').innerText = "Start Live Feed";
            btnToggle.style.background = "linear-gradient(135deg, var(--accent-blue) 0%, #2563eb 100%)";
            btnToggle.style.boxShadow = "0 4px 15px var(--accent-glow-blue)";
            btnCapture.disabled = true;
            
            resetResultState();
        }
    }

    function startPolling() {
        // Send a frame to python Flask server every 600ms
        detectionInterval = setInterval(captureAndPredict, 600);
    }

    function stopPolling() {
        if (detectionInterval) {
            clearInterval(detectionInterval);
            detectionInterval = null;
        }
    }

    function singleTrigger() {
        if (isDetecting) {
            captureAndPredict();
        }
    }

    function resetResultState() {
        panelResult.className = "glass-panel result-panel";
        badge.innerText = "Offline";
        badge.className = "status-badge";
        verdict.innerText = "Ready";
        setCirclePercentage(0);
        percentageVal.innerText = "0%";
        statLatency.innerText = "--";
        statFps.innerText = "--";
    }

    function setCirclePercentage(percent) {
        // 2 * PI * r (r=75) = 471.23
        const circ = 471.23;
        const offset = circ - (percent / 100) * circ;
        progressCircle.style.strokeDashoffset = offset;
    }

    async function captureAndPredict() {
        if (!stream) return;
        
        const tStart = performance.now();
        
        // Draw video frame to hidden canvas
        // Note: we mirror the drawing to compensate for visual video mirror
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        
        // Convert canvas image to Base64
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataUrl })
            });
            
            const result = await response.json();
            const tEnd = performance.now();
            const totalLatency = tEnd - tStart;
            
            if (result.success) {
                const score = result.score; // float in [0, 1]
                const probability = score * 100.0;
                
                // Update stats
                statLatency.innerText = `${result.latency_ms.toFixed(1)} ms`;
                
                // Calculate FPS
                const now = performance.now();
                if (lastFrameTime > 0) {
                    const fps = 1000 / (now - lastFrameTime);
                    statFps.innerText = fps.toFixed(1);
                }
                lastFrameTime = now;
                
                // Render verdict and gauge
                percentageVal.innerText = `${probability.toFixed(0)}%`;
                setCirclePercentage(probability);
                
                if (score >= 0.5) {
                    // Photo of Screen
                    panelResult.className = "glass-panel result-panel state-screen";
                    badge.innerText = "Recapture / Spoof";
                    badge.className = "status-badge";
                    verdict.innerText = "SCREEN PHOTO";
                } else {
                    // Real Photo
                    panelResult.className = "glass-panel result-panel state-real";
                    badge.innerText = "Real Image";
                    badge.className = "status-badge";
                    verdict.innerText = "GENUINE PHOTO";
                }
            } else {
                console.error("Server prediction error:", result.error);
            }
        } catch (err) {
            console.error("Failed to post frame:", err);
            statLatency.innerText = "Error";
        }
    }
</script>
</body>
</html>
